apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Deploy everything with:  kubectl apply -k k8s/
resources:
  - deployment.yaml
  - service.yaml
  - ingress.yaml

commonLabels:
  app.kubernetes.io/part-of: gmvis

# Override the image tag here instead of editing deployment.yaml, e.g.:
#   kustomize edit set image gmvis=ghcr.io/borisnan99/gmvis:1.0.0
images:
  - name: gmvis
    newName: gmvis
    newTag: latest
