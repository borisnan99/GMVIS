apiVersion: v1
kind: Secret
metadata:
  name: gmvis-api-secret
  labels:
    app.kubernetes.io/name: gmvis-api
    app.kubernetes.io/part-of: gmvis
type: Opaque
# ⚠️  CHANGE THESE before deploying. For better hygiene, create the secret
# out-of-band instead of committing real values, e.g.:
#   kubectl create secret generic gmvis-api-secret \
#     --from-literal=ADMIN_PASSWORD='your-strong-password' \
#     --from-literal=SESSION_SECRET="$(openssl rand -hex 32)"
stringData:
  ADMIN_PASSWORD: "change-me-admin-password"
  SESSION_SECRET: "change-me-to-a-long-random-string-at-least-32-characters"
