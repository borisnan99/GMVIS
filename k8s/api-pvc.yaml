apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gmvis-api-data
  labels:
    app.kubernetes.io/name: gmvis-api
    app.kubernetes.io/part-of: gmvis
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  # Set to a storage class available in your cluster if the default isn't suitable:
  # storageClassName: standard
