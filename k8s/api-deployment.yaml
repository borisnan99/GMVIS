apiVersion: apps/v1
kind: Deployment
metadata:
  name: gmvis-api
  labels:
    app.kubernetes.io/name: gmvis-api
    app.kubernetes.io/part-of: gmvis
spec:
  # Single replica: the SQLite DB + uploads live on a ReadWriteOnce volume and
  # SQLite expects a single writer. Recreate avoids two pods sharing the volume.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: gmvis-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gmvis-api
        app.kubernetes.io/part-of: gmvis
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000            # so the mounted volume is writable by the node user
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          # Replace with your registry/tag, e.g. ghcr.io/borisnan99/gmvis-api:1.0.0
          image: gmvis-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: DATA_DIR
              value: /data
            - name: SITE_DIR
              value: /site
            - name: NODE_ENV
              value: production
            - name: COOKIE_SECURE
              value: "true"          # cookies require HTTPS (TLS terminates at the ingress)
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gmvis-api-secret
                  key: ADMIN_PASSWORD
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: gmvis-api-secret
                  key: SESSION_SECRET
          readinessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: gmvis-api-data
        - name: tmp
          emptyDir: {}
