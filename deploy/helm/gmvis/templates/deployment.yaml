apiVersion: apps/v1
kind: Deployment
metadata:
  name: gmvis-web
  labels:
    {{- include "gmvis.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  # Single replica: the SQLite DB + uploads live on a ReadWriteOnce volume and
  # SQLite expects a single writer. Recreate avoids two pods sharing the volume.
  {{- if gt (int .Values.web.replicas) 1 }}
  {{- fail "web.replicas must be 1 — single SQLite writer on a ReadWriteOnce volume" }}
  {{- end }}
  replicas: {{ .Values.web.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "gmvis.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gmvis.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/part-of: gmvis
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000            # so the mounted volume is writable by the node user
        seccompProfile:
          type: RuntimeDefault
      {{- with .Values.image.pullSecretName }}
      imagePullSecrets:
        - name: {{ . }}
      {{- end }}
      containers:
        - name: web
          image: {{ include "gmvis.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.web.port }}
          env:
            - name: PORT
              value: {{ .Values.web.port | quote }}
            - name: DATA_DIR
              value: /data
            - name: SITE_DIR
              value: /site
            {{- range $k, $v := .Values.config }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gmvis-app
                  key: ADMIN_PASSWORD
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: gmvis-app
                  key: SESSION_SECRET
          readinessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: gmvis-api-data
        - name: tmp
          emptyDir: {}
