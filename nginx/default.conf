# Greater Manchester Vis — static site server (nginx-unprivileged, port 8080)
server {
    listen       8080;
    listen       [::]:8080;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # ---- Security headers (inherited by nested locations that add no headers) ----
    add_header X-Content-Type-Options "nosniff"                      always;
    add_header X-Frame-Options        "SAMEORIGIN"                   always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "geolocation=(), microphone=(), camera=()" always;

    # ---- Compression ----
    gzip            on;
    gzip_vary       on;
    gzip_min_length 256;
    gzip_proxied    any;
    gzip_types      text/plain text/css application/javascript application/json
                    image/svg+xml application/xml;

    # HTML is revalidated every request; assets are cached long. Using `expires`
    # (not add_header) so the security headers above are still inherited.
    expires -1;

    # ---- Health/readiness probe endpoint for Kubernetes ----
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # ---- Long-lived static assets ----
    location /assets/ {
        expires 30d;
        access_log off;
    }
    location /uploads/ {
        expires 30d;
        access_log off;
    }

    # ---- Pages: support both /about and /about.html ----
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    error_page 404 /404.html;
    location = /404.html { internal; }
}
